<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Tank Problem</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Water Tank Problem</h1>
        <div class="input-section">
            <label for="heights">Enter block heights (comma-separated):</label>
            <input type="text" id="heights" placeholder="e.g., 0,4,0,0,0,6,0,6,4,0">
            <button id="calculate">Calculate Water</button>
        </div>
        <div class="method-selection">
            <label for="method">Choose method:</label>
            <select id="method">
                <option value="brute">Brute Force</option>
                <option value="optimized">Optimized</option>
            </select>
        </div>
        <div class="result">
            <p id="total-water">Total water: 0 units</p>
        </div>
        <div class="visualization">
            <svg id="tank-svg" width="800" height="400"></svg>
        </div>
    </div>
    <script src="brute.js"></script>
    <script src="optimized.js"></script>
    <script src="app.js"></script>
</body>
</html>
